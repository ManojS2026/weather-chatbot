<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#1d2671,#c33764);
      padding:24px;
    }

    .app-layout{
      display:flex;
      gap:24px;
      align-items:stretch;
      justify-content:center;
      flex-wrap:wrap;
      width:min(1120px, 100%);
    }

    .weather-card{
      width:350px;
      padding:30px;
      border-radius:25px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      text-align:center;
      color:white;
      animation:fadeIn 1s ease;
    }

    .daily-card{
      flex:1;
      min-width:420px;
      max-width:720px;
      padding:28px;
      border-radius:25px;
      background: rgba(18,22,35,0.82);
      backdrop-filter: blur(12px);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      color:white;
      animation:fadeIn 1s ease;
    }

    .daily-top{
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:flex-start;
      margin-bottom:24px;
    }

    .location-row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .location-name{
      font-size:18px;
      font-weight:bold;
    }

    .location-button{
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.08);
      color:#cfe1ff;
      border-radius:999px;
      padding:9px 14px;
      cursor:pointer;
      transition:0.25s;
    }

    .location-button:hover{
      background:rgba(255,255,255,0.16);
    }

    .daily-main{
      display:flex;
      gap:18px;
      align-items:center;
      margin-top:18px;
    }

    .daily-icon{
      width:72px;
      height:72px;
    }

    .daily-temp{
      font-size:54px;
      line-height:1;
      font-weight:500;
    }

    .daily-meta{
      color:rgba(255,255,255,0.72);
      line-height:1.6;
      font-size:14px;
    }

    .daily-summary{
      text-align:right;
    }

    .daily-summary h2{
      font-size:26px;
      margin-bottom:4px;
    }

    .daily-summary p{
      color:rgba(255,255,255,0.72);
      line-height:1.5;
    }

    .hourly-list{
      display:grid;
      grid-template-columns:repeat(6, minmax(80px, 1fr));
      gap:12px;
      margin-top:24px;
    }

    .hour-card{
      background:rgba(255,255,255,0.08);
      border-radius:18px;
      padding:14px 10px;
      text-align:center;
    }

    .hour-card img{
      width:42px;
      height:42px;
      margin:8px auto;
      display:block;
    }

    .hour-time{
      color:rgba(255,255,255,0.72);
      font-size:13px;
    }

    .hour-temp{
      font-size:18px;
      font-weight:bold;
    }

    .daily-status{
      margin-top:16px;
      color:rgba(255,255,255,0.72);
      min-height:20px;
    }

    @media (max-width:760px){
      .daily-card{
        min-width:100%;
      }

      .daily-top{
        flex-direction:column;
      }

      .daily-summary{
        text-align:left;
      }

      .hourly-list{
        grid-template-columns:repeat(3, minmax(80px, 1fr));
      }
    }

    @keyframes fadeIn{
      from{
        transform:translateY(20px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    .search-box{
      display:flex;
      gap:10px;
      margin-bottom:25px;
    }

    .use-location-button{
      width:100%;
      margin-bottom:18px;
      padding:12px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:rgba(255,255,255,0.16);
      color:white;
      font-size:15px;
      transition:0.3s;
    }

    .use-location-button:hover{
      background:rgba(255,255,255,0.24);
    }

    .search-box input{
      flex:1;
      padding:12px;
      border:none;
      outline:none;
      border-radius:12px;
      font-size:16px;
    }

    .search-box button{
      padding:12px 18px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:#00c6ff;
      color:white;
      font-size:16px;
      transition:0.3s;
    }

    .search-box button:hover{
      background:#0072ff;
      transform:scale(1.05);
    }

    .weather-icon{
      width:120px;
      margin:10px auto;
    }

    .temp{
      font-size:60px;
      font-weight:bold;
    }

    .city{
      font-size:32px;
      margin-top:5px;
    }

    .condition{
      font-size:20px;
      margin:10px 0;
      opacity:0.9;
    }

    .details{
      display:flex;
      justify-content:space-between;
      margin-top:25px;
    }

    .detail-box{
      background:rgba(255,255,255,0.15);
      padding:15px;
      border-radius:15px;
      width:45%;
    }

    .detail-box h4{
      font-size:14px;
      margin-bottom:8px;
      opacity:0.8;
    }

    .detail-box p{
      font-size:22px;
      font-weight:bold;
    }

    .loading{
      margin-top:15px;
      display:none;
      font-size:16px;
      color:#eee;
    }

    .error{
      margin-top:15px;
      color:#ffb3b3;
      display:none;
    }

  </style>
</head>

<body>

  <main class="app-layout">
  <section class="daily-card">
    <div class="daily-top">
      <div>
        <div class="location-row">
          <div class="location-name" id="currentLocationName">Detecting your location...</div>
          <button class="location-button" onclick="loadPreciseLocationWeather()">
            Use precise location
          </button>
        </div>

        <div class="daily-main">
          <img
            class="daily-icon"
            id="dailyWeatherIcon"
            src="https://cdn.weatherapi.com/weather/64x64/day/116.png"
            alt="Weather icon"
          >
          <div class="daily-temp" id="dailyTemperature">--&deg;</div>
          <div class="daily-meta">
            <div>Precipitation: <span id="dailyPrecipitation">--%</span></div>
            <div>Humidity: <span id="dailyHumidity">--%</span></div>
            <div>Wind: <span id="dailyWind">-- km/h</span></div>
          </div>
        </div>
      </div>

      <div class="daily-summary">
        <h2>Weather</h2>
        <p id="dailyDateTime">--</p>
        <p id="dailyCondition">--</p>
      </div>
    </div>

    <div class="hourly-list" id="hourlyList"></div>
    <div class="daily-status" id="dailyStatus"></div>
  </section>

  <div class="weather-card">

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name">
      <button onclick="getWeather()">Search</button>
    </div>

    <button class="use-location-button" onclick="useMyLocationForSearchCard()">
      Use my location
    </button>

    <img src="https://cdn-icons-png.flaticon.com/512/1779/1779940.png"
         class="weather-icon"
         id="weatherIcon">

    <div class="temp" id="temperature">--&deg;C</div>
    <div class="city" id="cityName">Search City</div>
    <div class="condition" id="condition">Weather Condition</div>

    <div class="details">
      <div class="detail-box">
        <h4>Humidity</h4>
        <p id="humidity">--%</p>
      </div>

      <div class="detail-box">
        <h4>Wind</h4>
        <p id="wind">-- km/h</p>
      </div>
    </div>

    <div class="loading" id="loading">Loading weather...</div>
    <div class="error" id="error"></div>

  </div>
  </main>

  <script>
    const apiKey = "f7081843534548409f891251261705";
    function formatWeatherChatReply(data, displayName = ""){
      const city = displayName || data.location.name;
      const windSpeedMs = (data.current.wind_kph / 3.6).toFixed(1);

      return `🌤️ Weather in ${city}

🌡️ Temperature: ${Math.round(data.current.temp_c)}°C
☁️ Condition: ${data.current.condition.text}
💧 Humidity: ${data.current.humidity}%
🌬️ Wind Speed: ${windSpeedMs} m/s`;
    }

    function sendWeatherReplyToChatbot(data, displayName = ""){
      const dfMessenger = document.querySelector("df-messenger");

      if(!dfMessenger || typeof dfMessenger.renderCustomText !== "function"){
        return;
      }

      dfMessenger.renderCustomText(formatWeatherChatReply(data, displayName));
    }

    async function loadWeatherForQuery(query, displayName = ""){
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");

      loading.style.display = "block";
      error.style.display = "none";
      error.textContent = "";

      if(!query){
        error.textContent = "Please enter a city name.";
        error.style.display = "block";
        loading.style.display = "none";
        return;
      }

      try{

        const response = await fetch(
          `https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${encodeURIComponent(query)}`
        );

        if(!response.ok){
          if(response.status === 401){
            throw new Error("Invalid API key. Please check your WeatherAPI key.");
          }

          if(response.status === 400){
            throw new Error("City not found. Please check the spelling.");
          }

          throw new Error("Unable to fetch weather right now.");
        }

        const data = await response.json();

        document.getElementById("temperature").innerHTML =
          Math.round(data.current.temp_c) + "&deg;C";

        document.getElementById("cityName").innerHTML =
          displayName || data.location.name;

        document.getElementById("condition").innerHTML =
          data.current.condition.text;

        document.getElementById("humidity").innerHTML =
          data.current.humidity + "%";

        document.getElementById("wind").innerHTML =
          data.current.wind_kph + " km/h";

        const weatherMain = data.current.condition.text.toLowerCase();

        const icon = document.getElementById("weatherIcon");

        if(weatherMain.includes("cloud")){
          icon.src = "https://cdn-icons-png.flaticon.com/512/414/414825.png";
        }
        else if(weatherMain.includes("rain")){
          icon.src = "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
        }
        else if(weatherMain.includes("clear")){
          icon.src = "https://cdn-icons-png.flaticon.com/512/869/869869.png";
        }
        else if(weatherMain.includes("snow")){
          icon.src = "https://cdn-icons-png.flaticon.com/512/642/642102.png";
        }
        else{
          icon.src = "https://cdn-icons-png.flaticon.com/512/1779/1779940.png";
        }

        sendWeatherReplyToChatbot(data, displayName);

      }
      catch(err){
        error.textContent = err.message || "Something went wrong.";
        error.style.display = "block";
      }

      loading.style.display = "none";
    }

    async function getWeather(){
      const city = document.getElementById("cityInput").value.trim();
      await loadWeatherForQuery(city);
    }

    async function fetchForecast(query){
      const response = await fetch(
        `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${encodeURIComponent(query)}&days=1`
      );

      if(!response.ok){
        throw new Error("Unable to fetch daily weather right now.");
      }

      return response.json();
    }

    function formatLocalDateTime(localtime){
      const date = new Date(localtime.replace(" ", "T"));
      return date.toLocaleString("en-US", {
        weekday:"long",
        hour:"numeric",
        minute:"2-digit",
      });
    }

    function renderDailyWeather(data){
      const current = data.current;
      const location = data.location;
      const todayHours = data.forecast.forecastday[0].hour;
      const currentHour = new Date(location.localtime.replace(" ", "T")).getHours();
      const nextHours = todayHours
        .filter((hour) => new Date(hour.time.replace(" ", "T")).getHours() >= currentHour)
        .slice(0, 6);

      document.getElementById("currentLocationName").textContent =
        `${location.name}, ${location.region || location.country}`;
      document.getElementById("dailyTemperature").textContent =
        `${Math.round(current.temp_c)}\u00B0`;
      document.getElementById("dailyPrecipitation").textContent =
        `${todayHours[currentHour]?.chance_of_rain ?? 0}%`;
      document.getElementById("dailyHumidity").textContent =
        `${current.humidity}%`;
      document.getElementById("dailyWind").textContent =
        `${current.wind_kph} km/h`;
      document.getElementById("dailyDateTime").textContent =
        formatLocalDateTime(location.localtime);
      document.getElementById("dailyCondition").textContent =
        current.condition.text;
      document.getElementById("dailyWeatherIcon").src =
        `https:${current.condition.icon}`;

      const hourlyList = document.getElementById("hourlyList");
      hourlyList.innerHTML = "";

      nextHours.forEach((hour) => {
        const card = document.createElement("div");
        card.className = "hour-card";
        const date = new Date(hour.time.replace(" ", "T"));

        card.innerHTML = `
          <div class="hour-time">${date.toLocaleTimeString("en-US", {
            hour:"numeric"
          })}</div>
          <img src="https:${hour.condition.icon}" alt="${hour.condition.text}">
          <div class="hour-temp">${Math.round(hour.temp_c)}\u00B0</div>
        `;

        hourlyList.appendChild(card);
      });
    }

    async function loadCurrentLocationWeather(){
      const status = document.getElementById("dailyStatus");
      status.textContent = "Loading current location weather...";

      try{
        const data = await fetchForecast("auto:ip");
        renderDailyWeather(data);
        status.textContent = "";
      }
      catch(error){
        status.textContent =
          "Could not detect location automatically. Click \"Use precise location\".";
      }
    }

    function loadPreciseLocationWeather(){
      const status = document.getElementById("dailyStatus");

      if(!navigator.geolocation){
        status.textContent = "Precise location is not supported in this browser.";
        return;
      }

      status.textContent = "Requesting precise location...";

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          try{
            const { latitude, longitude } = position.coords;
            const data = await fetchForecast(`${latitude},${longitude}`);
            renderDailyWeather(data);
            status.textContent = "";
          }
          catch(error){
            status.textContent = error.message;
          }
        },
        (error) => {
          if(error.code === error.PERMISSION_DENIED){
            status.textContent = "Location permission was denied.";
          }
          else if(error.code === error.POSITION_UNAVAILABLE){
            status.textContent = "Location information is unavailable.";
          }
          else if(error.code === error.TIMEOUT){
            status.textContent = "Location request timed out. Please try again.";
          }
          else{
            status.textContent = "Unable to get your precise location.";
          }
        },
        {
          enableHighAccuracy:true,
          timeout:10000,
          maximumAge:0
        }
      );
    }

    function useMyLocationForSearchCard(){
      const error = document.getElementById("error");

      if(!navigator.geolocation){
        error.textContent = "Location is not supported in this browser.";
        error.style.display = "block";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          await loadWeatherForQuery(`${latitude},${longitude}`, "My Location");
        },
        (locationError) => {
          if(locationError.code === locationError.PERMISSION_DENIED){
            error.textContent = "Location permission was denied.";
          }
          else if(locationError.code === locationError.POSITION_UNAVAILABLE){
            error.textContent = "Location information is unavailable.";
          }
          else if(locationError.code === locationError.TIMEOUT){
            error.textContent = "Location request timed out. Please try again.";
          }
          else{
            error.textContent = "Unable to get your current location.";
          }

          error.style.display = "block";
        },
        {
          enableHighAccuracy:true,
          timeout:10000,
          maximumAge:0
        }
      );
    }

    loadCurrentLocationWeather();

  </script>

  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
  <df-messenger
    intent="WELCOME"
    chat-title="Weather-Agent"
    agent-id="8d62ba2b-bb5e-4c6c-b5a9-4e8727a4d3a6"
    language-code="en"
  ></df-messenger>

</body>
</html>
